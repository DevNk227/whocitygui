<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Premium Notify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: transparent !important; 
            overflow: hidden; 
            font-family: 'Prompt', sans-serif; 
        }
        
        /* แอนิเมชันเด้งแบบมีสปริง (Bounce) */
        .slide-down-bounce { 
            animation: slideDownBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; 
        }
        
        @keyframes slideDownBounce {
            0% { opacity: 0; transform: translate(-50%, -60px) scale(0.9); }
            100% { opacity: 1; transform: translate(-50%, 0) scale(1); }
        }

        /* เอฟเฟกต์แสงเงาด้านหลัง */
        .glow-effect {
            box-shadow: 0 10px 40px -10px rgba(29, 161, 242, 0.4), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="w-screen h-screen relative pt-8">

    <div id="notify-box" class="hidden absolute top-8 left-1/2 -translate-x-1/2 bg-[#000000]/70 backdrop-blur-xl border border-white/10 rounded-[28px] glow-effect p-4 min-w-[340px] max-w-[450px] transition-all">
        
        <div class="flex items-start gap-4">
            
            <div class="relative shrink-0 mt-0.5">
                <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-[#1DA1F2] to-[#8A2BE2] p-[2px]">
                    <div class="w-full h-full rounded-full bg-[#15202B] flex items-center justify-center border border-black/50">
                        <span id="avatar" class="text-white font-bold text-xl drop-shadow-md">P</span>
                    </div>
                </div>
                <div class="absolute -bottom-1 -right-1 bg-black rounded-full p-1 border border-white/10">
                    <svg class="w-3.5 h-3.5 text-[#1DA1F2]" fill="currentColor" viewBox="0 0 24 24"><path d="M23.643 4.937c-.835.37-1.732.62-2.675.733.962-.576 1.7-1.49 2.048-2.578-.9.534-1.897.922-2.958 1.13-.85-.904-2.06-1.47-3.4-1.47-2.572 0-4.658 2.086-4.658 4.66 0 .364.042.718.12 1.06-3.873-.195-7.304-2.05-9.602-4.868-.4.69-.63 1.49-.63 2.342 0 1.616.823 3.043 2.072 3.878-.764-.025-1.482-.234-2.11-.583v.06c0 2.257 1.605 4.14 3.737 4.568-.392.106-.803.162-1.227.162-.3 0-.593-.028-.877-.082.593 1.85 2.313 3.198 4.352 3.234-1.595 1.25-3.604 1.995-5.786 1.995-.376 0-.747-.022-1.112-.065 2.062 1.323 4.51 2.093 7.14 2.093 8.57 0 13.255-7.098 13.255-13.254 0-.2-.005-.402-.014-.602.91-.658 1.7-1.477 2.323-2.41z"/></svg>
                </div>
            </div>

            <div class="flex-1 min-w-0 pt-0.5">
                <div class="flex justify-between items-center mb-0.5">
                    <h1 class="font-bold text-white text-[16px] flex items-center gap-1 truncate pr-2">
                        <span id="player-name" class="truncate">Player Name</span>
                        <svg class="w-4 h-4 text-[#1DA1F2] shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M22.5 12.5c0-1.58-.875-2.95-2.148-3.6.154-.435.238-.905.238-1.4 0-2.21-1.71-3.998-3.918-3.998-.47 0-.92.084-1.336.25C14.818 2.415 13.51 1.5 12 1.5s-2.816.917-3.337 2.25c-.416-.165-.866-.25-1.336-.25-2.21 0-3.918 1.79-3.918 4 0 .495.084.965.238 1.4-1.273.65-2.148 2.02-2.148 3.6 0 1.46.74 2.76 1.868 3.46-.067.31-.104.63-.104.95 0 2.21 1.71 4 3.918 4 .54 0 1.05-.12 1.51-.33.518 1.32 1.815 2.22 3.325 2.22s2.806-.9 3.325-2.22c.46.21 1.97.33 1.51.33 2.21 0 3.918-1.79 3.918-4 0-.32-.037-.64-.104-.95 1.128-.7 1.868-2 1.868-3.46zm-10.46 3.68l-3.95-3.95 1.41-1.41 2.54 2.54 5.43-5.43 1.41 1.41-6.84 6.84z"/></svg>
                    </h1>
                    <span class="text-[#8899A6] text-[13px] font-medium shrink-0">now</span>
                </div>
                <p id="player-msg" class="text-[#E7E9EA] text-[14.5px] leading-relaxed break-words font-light">
                    Message will appear here...
                </p>
            </div>

        </div>
    </div>

    <script>
        // รับข้อความจากเกม
        if (typeof cef !== 'undefined') {
            cef.on("ShowTweetNotify", (name, message) => {
                document.getElementById('player-name').innerText = name;
                document.getElementById('player-msg').innerText = message;
                
                // โชว์อักษรตัวแรก
                if(name && name.length > 0) {
                    document.getElementById('avatar').innerText = name.charAt(0).toUpperCase();
                } else {
                    document.getElementById('avatar').innerText = "X";
                }
                
                const box = document.getElementById('notify-box');
                box.classList.remove('slide-down-bounce');
                void box.offsetWidth; 
                box.classList.remove('hidden');
                box.classList.add('slide-down-bounce');
            });
        } else {
            // โค้ดทดสอบตอนเปิดบนเว็บปกติ (เพื่อดูความสวยงาม)
            setTimeout(() => {
                document.getElementById('player-name').innerText = "Wanweek Admin";
                document.getElementById('player-msg').innerText = "Welcome to our new premium notification system! Have a good time in the city.";
                document.getElementById('avatar').innerText = "W";
                const box = document.getElementById('notify-box');
                box.classList.remove('hidden');
                box.classList.add('slide-down-bounce');
            }, 500);
        }
    </script>
</body>
</html>
