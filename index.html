<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Notify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: transparent !important; overflow: hidden; font-family: 'Prompt', sans-serif; }
        
        /* แอนิเมชันเด้งลงมาจากขอบจอบน */
        .slide-down { animation: slideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideDown {
            from { opacity: 0; transform: translate(-50%, -50px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
    </style>
</head>
<body class="w-screen h-screen relative">

    <div id="notify-box" class="hidden absolute top-10 left-1/2 -translate-x-1/2 bg-[#15202B]/90 backdrop-blur-md border border-[#22303C] rounded-2xl shadow-[0_10px_30px_rgba(29,161,242,0.2)] p-4 min-w-[300px] max-w-[500px]">
        <div class="flex items-start gap-3">
            <div class="relative">
                <div id="avatar" class="w-10 h-10 rounded-full bg-gradient-to-tr from-[#1DA1F2] to-blue-800 flex items-center justify-center text-white font-bold text-lg shadow-inner">
                    P
                </div>
                <div class="absolute -bottom-1 -right-1 bg-[#15202B] rounded-full p-0.5">
                    <svg class="w-4 h-4 text-[#1DA1F2]" fill="currentColor" viewBox="0 0 24 24"><path d="M23.643 4.937c-.835.37-1.732.62-2.675.733.962-.576 1.7-1.49 2.048-2.578-.9.534-1.897.922-2.958 1.13-.85-.904-2.06-1.47-3.4-1.47-2.572 0-4.658 2.086-4.658 4.66 0 .364.042.718.12 1.06-3.873-.195-7.304-2.05-9.602-4.868-.4.69-.63 1.49-.63 2.342 0 1.616.823 3.043 2.072 3.878-.764-.025-1.482-.234-2.11-.583v.06c0 2.257 1.605 4.14 3.737 4.568-.392.106-.803.162-1.227.162-.3 0-.593-.028-.877-.082.593 1.85 2.313 3.198 4.352 3.234-1.595 1.25-3.604 1.995-5.786 1.995-.376 0-.747-.022-1.112-.065 2.062 1.323 4.51 2.093 7.14 2.093 8.57 0 13.255-7.098 13.255-13.254 0-.2-.005-.402-.014-.602.91-.658 1.7-1.477 2.323-2.41z"/></svg>
                </div>
            </div>

            <div class="flex-1">
                <h1 id="player-name" class="font-bold text-white text-[15px] flex items-center gap-1">
                    ชื่อผู้เล่น
                </h1>
                <p id="player-msg" class="text-[#E7E9EA] text-[14px] mt-1 leading-snug break-words">
                    ข้อความจะโชว์ตรงนี้...
                </p>
            </div>
        </div>
    </div>

    <script>
        // สุดยอดระบบซ่อมฟอนต์ไทย (ตัวเดิมที่ฉลาดๆ)
        function superDecodeThai(str) {
            if (!str) return "";
            let isHex = true, hexResult = "";
            if (str.length % 2 === 0 && str.length > 0) {
                for (let i = 0; i < str.length; i += 2) {
                    let code = parseInt(str.substr(i, 2), 16);
                    if (isNaN(code)) { isHex = false; break; }
                    if (code >= 0xA1 && code <= 0xFB) hexResult += String.fromCharCode(code + 0x0D60); 
                    else hexResult += String.fromCharCode(code);
                }
            } else isHex = false;

            if (isHex) return hexResult; 

            let normalResult = "";
            for (let i = 0; i < str.length; i++) {
                let code = str.charCodeAt(i);
                if (code >= 0xA1 && code <= 0xFB) normalResult += String.fromCharCode(code + 0x0D60);
                else normalResult += str.charAt(i);
            }
            return normalResult;
        }

        // 🚨 ของใหม่! เปิดประตูรับคำสั่งตรงจากโปรแกรม Pawn (JS Injection)
        window.ForceShowTweet = function(hexName, hexMessage) {
            const realName = superDecodeThai(hexName);
            const realMessage = superDecodeThai(hexMessage);

            document.getElementById('player-name').innerText = realName;
            document.getElementById('player-msg').innerText = realMessage;
            if(realName.length > 0) document.getElementById('avatar').innerText = realName.charAt(0);
            
            const box = document.getElementById('notify-box');
            // รีเซ็ตแอนิเมชันให้มันเด้งใหม่ทุกครั้งที่ถูกเรียก
            box.classList.remove('slide-down');
            void box.offsetWidth; 
            box.classList.remove('hidden');
            box.classList.add('slide-down');
        };
    </script>
</body>
</html>
